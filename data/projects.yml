name: Projects
source:
  - icon: fab fa-github
    name: arXiv Digest Bot
    description: An automated AI/ML research paper digest system that fetches papers daily from arXiv, ranks them by configurable interest keywords, and generates Claude-powered summaries delivered as a weekly email digest. Built with Python, Claude API, Docker, SQLite, and cron scheduling.

  - icon: fab fa-github
    name: ubersid.in
    description: This personal website — a Hugo static site deployed via GitHub Actions to S3 + CloudFront with OIDC-based AWS authentication. Recently modernized from Hugo 0.83 to 0.155+, migrated CI/CD from AWS CodeBuild to GitHub Actions, and added HTTPS via ACM + CloudFront.

  - icon: fab fa-github
    name: Java Pad Server
    description: A Java-based app demonstrating different multi-threading paradigms, particularly NIO networking. An effort to understand what makes Java NIO worth using.

  - icon: fab fa-github
    name: Raspberry Pi / Arduino tinkering
    description: Having done my engineering in electronics, I enjoy the cross-over between hardware and software. Tinkering with Raspberry Pi and Arduino for home automation and sensor projects.
